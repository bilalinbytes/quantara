global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'quantara-backend'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
