version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quantara
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quantara_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantara"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://quantara:password@postgres/quantara_dev
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-quantara-jwt-signing-key-2026
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://quantara:password@postgres/quantara_dev
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://quantara:password@postgres/quantara_dev
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC vars are baked into the build at compile time.
        # This points the browser to the host machine's backend port.
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "30000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"

volumes:
  postgres_data:
  qdrant_data:
